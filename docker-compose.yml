version: '3.8'

services:
  backend:
    build:
      context: ./ProjectManagerWebAPI
      dockerfile: Dockerfile
    container_name: project-manager-backend
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_URLS=http://+:5000
      - ASPNETCORE_ENVIRONMENT=Production
    volumes:
      - ./ProjectManagerWebAPI/projectmanager.db:/app/projectmanager.db
    restart: unless-stopped
    networks:
      - project-manager-network

  frontend:
    build:
      context: ./ProjectManager/ProjectManagerWebUI
      dockerfile: Dockerfile
    container_name: project-manager-frontend
    ports:
      - "4200:4200"
    depends_on:
      - backend
    environment:
      - NODE_ENV=production
      - API_URL=http://backend:5000
    restart: unless-stopped
    networks:
      - project-manager-network

networks:
  project-manager-network:
    driver: bridge
