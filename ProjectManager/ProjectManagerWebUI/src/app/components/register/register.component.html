<div class="register-container">
  <div class="register-box">
    <div class="register-header">
      <h1>Gestor de Projetos</h1>
      <p>Criar Novo Utilizador</p>
    </div>

    <form (ngSubmit)="register()" class="register-form">
      <!-- Mensagens de Erro -->
      <div *ngIf="errorMessage" class="alert alert-error">
        {{ errorMessage }}
      </div>

      <!-- Mensagem de Sucesso -->
      <div *ngIf="successMessage" class="alert alert-success">
        {{ successMessage }}
      </div>

      <!-- Informação sobre Password Gerada -->
      <div class="info-box">
        <p>✓ Uma password segura será gerada automaticamente e enviada por email ao novo utilizador.</p>
      </div>

      <!-- Nome Completo -->
      <div class="form-group">
        <label for="fullName">Nome Completo *</label>
        <input
          id="fullName"
          type="text"
          [(ngModel)]="form.fullName"
          name="fullName"
          placeholder="Introduza o seu nome completo"
          class="form-input"
          [disabled]="loading">
      </div>

      <!-- Email -->
      <div class="form-group">
        <label for="email">Email *</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="form.email"
          name="email"
          placeholder="Introduza o seu email"
          class="form-input"
          [disabled]="loading">
      </div>

      <!-- Role -->
      <div class="form-group">
        <label for="role">Tipo de Utilizador *</label>
        <select
          id="role"
          [(ngModel)]="form.role"
          name="role"
          class="form-input"
          [disabled]="loading">
          <option *ngFor="let role of roles" [value]="role.value">
            {{ role.label }}
          </option>
        </select>
      </div>

      <!-- Botões -->
      <div class="form-actions">
        <button
          type="submit"
          class="btn btn-primary"
          [disabled]="loading">
          {{ loading ? 'Registando...' : 'Registar' }}
        </button>
      </div>

      <!-- Link para Login -->
      <div class="form-footer">
        <p>Já tem conta? <a href="javascript:void(0)" (click)="goToLogin()">Faça login aqui</a></p>
      </div>
    </form>
  </div>
</div>
