<div *ngIf="isOpen" class="modal-overlay" (click)="closeModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>Alterar Password</h2>
      <button class="btn-close" (click)="closeModal()">✕</button>
    </div>

    <form (ngSubmit)="onSubmit()" class="modal-body">
      <div *ngIf="error" class="alert alert-error">
        {{ error }}
      </div>

      <div *ngIf="success" class="alert alert-success">
        {{ success }}
      </div>

      <div class="form-group">
        <label>Password Atual *</label>
        <input
          type="password"
          [(ngModel)]="form.currentPassword"
          name="currentPassword"
          placeholder="Introduza a sua password atual"
          [disabled]="loading"
          required>
      </div>

      <div class="form-group">
        <label>Nova Password *</label>
        <input
          type="password"
          [(ngModel)]="form.newPassword"
          name="newPassword"
          placeholder="Introduza a nova password (mínimo 6 caracteres)"
          [disabled]="loading"
          required>
      </div>

      <div class="form-group">
        <label>Confirmar Nova Password *</label>
        <input
          type="password"
          [(ngModel)]="form.confirmPassword"
          name="confirmPassword"
          placeholder="Confirme a nova password"
          [disabled]="loading"
          required>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="closeModal()" [disabled]="loading">
          Cancelar
        </button>
        <button type="submit" class="btn btn-primary" [disabled]="loading">
          {{ loading ? 'Alterando...' : '✓ Alterar Password' }}
        </button>
      </div>
    </form>
  </div>
</div>
