@if (isOpen) {
  <div class="cp-backdrop" (click)="close()">
    <div class="cp-box" (click)="$event.stopPropagation()">
      <div class="cp-header">
        <h3>Alterar Password</h3>
        <button class="cp-close" (click)="close()">✕</button>
      </div>

      <div class="cp-body">
        @if (sucesso) {
          <div class="cp-success">{{ sucesso }}</div>
        } @else {
          @if (erro) { <div class="cp-err">{{ erro }}</div> }

          <div class="cp-field">
            <label>Password atual</label>
            <input type="password" [(ngModel)]="form.currentPassword" placeholder="Password atual" class="cp-input" (keyup.enter)="submeter()">
          </div>
          <div class="cp-field">
            <label>Nova password</label>
            <input type="password" [(ngModel)]="form.newPassword" placeholder="Mínimo 6 caracteres" class="cp-input" (keyup.enter)="submeter()">
          </div>
          <div class="cp-field">
            <label>Confirmar nova password</label>
            <input type="password" [(ngModel)]="form.confirmPassword" placeholder="Repita a nova password" class="cp-input" (keyup.enter)="submeter()">
          </div>
        }
      </div>

      @if (!sucesso) {
        <div class="cp-footer">
          <button class="cp-btn-sec" (click)="close()" [disabled]="loading">Cancelar</button>
          <button class="cp-btn-pri" (click)="submeter()" [disabled]="loading" style="display:flex;align-items:center;gap:6px">
            @if (loading) { <span class="cp-spinner"></span> }
            Alterar Password
          </button>
        </div>
      }
    </div>
  </div>
}
