<header class="navbar">
  <div class="navbar-brand">
    <img src="assets/zoompositivo-logo.png" alt="ZoomPositivo" class="navbar-logo">
    <h1>Gestor de Projetos</h1>
  </div>

  <div class="navbar-content">
    <div class="user-menu">
      <button class="user-btn" (click)="toggleUserMenu()">
        👤 {{ currentUser?.fullName }}
      </button>
      <div *ngIf="showUserMenu" class="dropdown-menu">
        <button class="dropdown-item" (click)="openChangePassword()">
          🔐 Alterar Password
        </button>
        <button class="dropdown-item" (click)="logout()">
          🚪 Sair
        </button>
      </div>
    </div>
  </div>
</header>
